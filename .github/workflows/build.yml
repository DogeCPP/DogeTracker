name: Build DogeTracker

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      xplane_version:
        description: 'X-Plane SDK version tag (e.g. XPSDK421)'
        required: false
        default: 'XPSDK421'

env:
  SDK_TAG: ${{ github.event.inputs.xplane_version || 'XPSDK421' }}

jobs:

  # ── macOS — universal (arm64 + x86_64) ───────────────────────────────
  build-mac:
    name: macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download X-Plane SDK
        run: |
          curl -L "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/${{ env.SDK_TAG }}.zip" -o XPSDK.zip
          unzip -q XPSDK.zip -d sdk_raw
          mv sdk_raw/SDK ./SDK

      - name: Configure
        run: |
          cmake -DCMAKE_TOOLCHAIN_FILE=toolchain-mac.cmake \
                -DXPLANE_SDK_PATH="${PWD}/SDK" \
                -Bbuild/mac .

      - name: Build
        run: make -C build/mac -j$(sysctl -n hw.logicalcpu)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dogetracker-mac
          path: build/mac/package/DogeTracker/
          retention-days: 30

  # ── Windows — cross-compiled from Linux via MinGW ────────────────────
  build-win:
    name: Windows x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake mingw-w64 gcc-mingw-w64-x86-64-posix g++-mingw-w64-x86-64-posix

      - name: Download X-Plane SDK
        run: |
          curl -L "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/${{ env.SDK_TAG }}.zip" -o XPSDK.zip
          unzip -q XPSDK.zip -d sdk_raw
          mv sdk_raw/SDK ./SDK

      - name: Configure
        run: |
          cmake -DCMAKE_TOOLCHAIN_FILE=toolchain-mingw64.cmake \
                -DXPLANE_SDK_PATH="${PWD}/SDK" \
                -Bbuild/win .

      - name: Build
        run: make -C build/win -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dogetracker-win
          path: build/win/package/DogeTracker/
          retention-days: 30

  # ── Linux x64 ────────────────────────────────────────────────────────
  build-lin:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgl-dev

      - name: Download X-Plane SDK
        run: |
          curl -L "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/${{ env.SDK_TAG }}.zip" -o XPSDK.zip
          unzip -q XPSDK.zip -d sdk_raw
          mv sdk_raw/SDK ./SDK

      - name: Configure
        run: |
          cmake -DCMAKE_TOOLCHAIN_FILE=toolchain-lin.cmake \
                -DXPLANE_SDK_PATH="${PWD}/SDK" \
                -Bbuild/lin .

      - name: Build
        run: make -C build/lin -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dogetracker-lin
          path: build/lin/package/DogeTracker/
          retention-days: 30

  # ── Package — combine all 3 into one zip ─────────────────────────────
  package:
    name: Package Release
    runs-on: ubuntu-latest
    needs: [ build-mac, build-win, build-lin ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip release
        run: |
          mkdir -p release/DogeTracker
          cp -r artifacts/dogetracker-mac/. release/DogeTracker/
          cp -r artifacts/dogetracker-win/. release/DogeTracker/
          cp -r artifacts/dogetracker-lin/. release/DogeTracker/
          cd release
          zip -rq DogeTracker-all-platforms.zip DogeTracker

      - uses: actions/upload-artifact@v4
        with:
          name: DogeTracker-all-platforms
          path: release/DogeTracker-all-platforms.zip
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/DogeTracker-all-platforms.zip
