name: Build DogeTracker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      xplane_version:
        description: 'X-Plane version (11 or 12)'
        required: true
        default: '12'

env:
  XPLANE_VERSION: ${{ github.event.inputs.xplane_version || '12' }}
  CEF_VERSION: '145.0.28+g51162e8+chromium-145.0.7632.160'

jobs:

  # ─────────────────────────────────────────────────────────────────────
  #  macOS — universal binary (arm64 + x86_64)
  # ─────────────────────────────────────────────────────────────────────
  build-mac:
    name: macOS Universal
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Download X-Plane SDK
        run: |
          curl -L "curl -L "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK430.zip" \
               -o XPSDK.zip
          unzip -q XPSDK.zip -d SDK_raw
          # Move to expected location
          mkdir -p SDK
          cp -r SDK_raw/SDK/CHeaders SDK/CHeaders
          cp -r SDK_raw/SDK/Libraries SDK/Libraries

      - name: Download CEF (macOS ARM64)
        run: |
          CEF_NAME="cef_binary_${{ env.CEF_VERSION }}_macosarm64"
          curl -L "https://cef-builds.spotifycdn.com/${CEF_NAME}.tar.bz2" \
               -o cef_mac_arm64.tar.bz2
          mkdir -p lib/mac_arm64/cef
          tar -xjf cef_mac_arm64.tar.bz2 -C lib/mac_arm64/cef --strip-components=1

      - name: Download CEF (macOS x86_64)
        run: |
          CEF_NAME="cef_binary_${{ env.CEF_VERSION }}_macosx64"
          curl -L "https://cef-builds.spotifycdn.com/${CEF_NAME}.tar.bz2" \
               -o cef_mac_x64.tar.bz2
          mkdir -p lib/mac_x64/cef
          tar -xjf cef_mac_x64.tar.bz2 -C lib/mac_x64/cef --strip-components=1

      - name: Build CEF wrapper (ARM64)
        run: |
          cd lib/mac_arm64/cef
          cmake -DCMAKE_OSX_ARCHITECTURES="arm64" \
                -DCMAKE_OSX_DEPLOYMENT_TARGET="11.0" \
                -Bbuild .
          make -C build libcef_dll_wrapper -j$(sysctl -n hw.logicalcpu)
          cp build/libcef_dll_wrapper/libcef_dll_wrapper.a ./

      - name: Build CEF wrapper (x86_64)
        run: |
          cd lib/mac_x64/cef
          cmake -DCMAKE_OSX_ARCHITECTURES="x86_64" \
                -DCMAKE_OSX_DEPLOYMENT_TARGET="10.12" \
                -Bbuild .
          make -C build libcef_dll_wrapper -j$(sysctl -n hw.logicalcpu)
          cp build/libcef_dll_wrapper/libcef_dll_wrapper.a ./

      - name: Build DogeTracker (macOS)
        run: |
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-mac.cmake \
            -DXPLANE_VERSION=${{ env.XPLANE_VERSION }} \
            -Bbuild/mac .
          make -C build/mac -j$(sysctl -n hw.logicalcpu)

      - name: Collect artifact
        run: |
          mkdir -p dist/mac_x64
          cp build/mac/mac_x64/dogetracker.xpl dist/mac_x64/dogetracker.xpl

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: dogetracker-mac
          path: dist/mac_x64/dogetracker.xpl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  #  Windows — x86_64 cross-compiled via MinGW
  # ─────────────────────────────────────────────────────────────────────
  build-win:
    name: Windows x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake mingw-w64 p7zip-full

      - name: Download X-Plane SDK
        run: |
          curl -L "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK430.zip" \
               -o XPSDK.zip
          unzip -q XPSDK.zip -d SDK_raw
          mkdir -p SDK
          cp -r SDK_raw/SDK/CHeaders SDK/CHeaders
          cp -r SDK_raw/SDK/Libraries SDK/Libraries

      - name: Download CEF (Windows 64-bit)
        run: |
          CEF_NAME="cef_binary_${{ env.CEF_VERSION }}_windows64"
          curl -L "https://cef-builds.spotifycdn.com/${CEF_NAME}.tar.bz2" \
               -o cef_win64.tar.bz2
          mkdir -p lib/win_x64/cef
          tar -xjf cef_win64.tar.bz2 -C lib/win_x64/cef --strip-components=1

      - name: Build CEF wrapper (Windows)
        run: |
          cd lib/win_x64/cef
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=../../../toolchain-win.cmake \
            -Bbuild .
          make -C build libcef_dll_wrapper -j$(nproc)
          mkdir -p libcef_dll_wrapper
          cp build/libcef_dll_wrapper/libcef_dll_wrapper.a libcef_dll_wrapper/

      - name: Build DogeTracker (Windows)
        run: |
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-win.cmake \
            -DXPLANE_VERSION=${{ env.XPLANE_VERSION }} \
            -Bbuild/win .
          make -C build/win -j$(nproc)

      - name: Collect artifact
        run: |
          mkdir -p dist/win_x64
          cp build/win/win_x64/dogetracker.xpl dist/win_x64/dogetracker.xpl

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: dogetracker-win
          path: dist/win_x64/dogetracker.xpl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  #  Linux — x86_64
  # ─────────────────────────────────────────────────────────────────────
  build-lin:
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential \
            libgl-dev libcurl4-openssl-dev \
            libssl-dev libudev-dev pkg-config

      - name: Download X-Plane SDK
        run: |
          curl -L "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK430.zip" \
               -o XPSDK.zip
          unzip -q XPSDK.zip -d SDK_raw
          mkdir -p SDK
          cp -r SDK_raw/SDK/CHeaders SDK/CHeaders
          cp -r SDK_raw/SDK/Libraries SDK/Libraries

      - name: Download CEF (Linux 64-bit)
        run: |
          CEF_NAME="cef_binary_${{ env.CEF_VERSION }}_linux64"
          curl -L "https://cef-builds.spotifycdn.com/${CEF_NAME}.tar.bz2" \
               -o cef_lin64.tar.bz2
          mkdir -p lib/lin_x64/cef
          tar -xjf cef_lin64.tar.bz2 -C lib/lin_x64/cef --strip-components=1

      - name: Build CEF wrapper (Linux)
        run: |
          cd lib/lin_x64/cef
          cmake -DCMAKE_CXX_FLAGS="-march=x86-64" -Bbuild .
          make -C build libcef_dll_wrapper -j$(nproc)
          mkdir -p libcef_dll_wrapper
          cp build/libcef_dll_wrapper/libcef_dll_wrapper.a libcef_dll_wrapper/

      - name: Build DogeTracker (Linux)
        run: |
          cmake \
            -DCMAKE_CXX_FLAGS="-march=x86-64" \
            -DCMAKE_TOOLCHAIN_FILE=toolchain-lin.cmake \
            -DXPLANE_VERSION=${{ env.XPLANE_VERSION }} \
            -Bbuild/lin .
          make -C build/lin -j$(nproc)

      - name: Collect artifact
        run: |
          mkdir -p dist/lin_x64
          cp build/lin/lin_x64/dogetracker.xpl dist/lin_x64/dogetracker.xpl

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: dogetracker-lin
          path: dist/lin_x64/dogetracker.xpl
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────
  #  Package — zip all 3 platforms together into one release zip
  # ─────────────────────────────────────────────────────────────────────
  package:
    name: Package Release
    runs-on: ubuntu-latest
    needs: [ build-mac, build-win, build-lin ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release zip
        run: |
          VERSION=$(grep "#define VERSION " src/include/config.h | cut -d '"' -f2)
          mkdir -p release/dogetracker/mac_x64
          mkdir -p release/dogetracker/win_x64
          mkdir -p release/dogetracker/lin_x64
          cp artifacts/dogetracker-mac/dogetracker.xpl release/dogetracker/mac_x64/
          cp artifacts/dogetracker-win/dogetracker.xpl release/dogetracker/win_x64/
          cp artifacts/dogetracker-lin/dogetracker.xpl release/dogetracker/lin_x64/
          cp -r assets release/dogetracker/
          cd release
          zip -rq dogetracker-${VERSION}-XP${{ env.XPLANE_VERSION }}.zip dogetracker
          echo "RELEASE_FILE=release/dogetracker-${VERSION}-XP${{ env.XPLANE_VERSION }}.zip" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: dogetracker-all-platforms
          path: ${{ env.RELEASE_FILE }}
          retention-days: 90

      # Auto-create a GitHub Release when pushing a version tag (v1.0.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_FILE }}
          name: DogeTracker ${{ env.VERSION }}
          body: |
            ## DogeTracker ${{ env.VERSION }}
            
            Built for X-Plane ${{ env.XPLANE_VERSION }}
            
            ### Installation
            1. Download and extract the zip
            2. Copy the `dogetracker/` folder to `X-Plane/Resources/plugins/`
            3. Edit `config.ini` and set your `homepage=`
